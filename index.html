<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomodoro timer</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: "Courier Prime", monospace;
  background: #33427a;
  transition: background 1.2s ease, color 1.2s ease;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 380px;
  padding: 30px;
  border-radius: 18px;
  text-align: center;
}

h1 {
  color: #6580a3;
  font-size: 27px;
  letter-spacing: 2px;
  text-transform: lowercase;
  margin-bottom: 10px;
}

.status {
  color: #6580a3;
  font-size: 19px;
  margin-bottom: 15px;
  opacity: 0.85;
  text-transform: lowercase;
}

.timer {
  font-size: 96px;
  font-weight: 700;
  color: #6580a3;
  margin: 20px 0;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: rgba(217, 201, 169, 0.25);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: #d9c9a9;
  transition: width 1s linear;
}

.settings-labels {
  display: flex;
  justify-content: space-between;
  color: #6580a3;
  font-size: 14px;
  margin-bottom: 5px;
  text-transform: lowercase;
}

.settings {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 15px;
}

input {
  width: 90px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #d9c9a9;
  color: #33427a;
  font-family: "Courier Prime", monospace;
  font-weight: 700;
  text-align: center;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: "Courier Prime", monospace;
  font-weight: 700;
  background: #d9c9a9;
  color: #33427a;
  transition: 0.2s ease;
  text-transform: lowercase;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}

/* 🌙 NIGHT MODE */
.dark {
  background: #000 !important;
  animation: nightFade 1.2s ease forwards;
}

.dark h1,
.dark .status,
.dark .timer,
.dark .settings-labels {
  color: #fff !important;
  transition: color 1.2s ease;
}

.dark input,
.dark button {
  background: #fff;
  color: #000;
  transition: all 1.2s ease;
}

.dark .progress-container {
  background: rgba(255,255,255,0.2);
}

.dark .progress-bar {
  background: #fff;
}

/* 🌌 animation */
@keyframes nightFade {
  0% { filter: brightness(1.3); }
  50% { filter: brightness(0.4) blur(1px); }
  100% { filter: brightness(0.7); }
}

/* ✨ GEM GLOW */
.gem-glow {
  animation: glow 0.6s ease;
}

@keyframes glow {
  0% { text-shadow: 0 0 0px #fff; transform: scale(1); }
  50% { text-shadow: 0 0 15px #fff, 0 0 30px #d9c9a9; transform: scale(1.2); }
  100% { text-shadow: 0 0 0px #fff; transform: scale(1); }
}
</style>
</head>

<body>

<div class="card">
  <h1>pomodoro</h1>

  <div class="status">
    <span id="mode">ready</span> • <span id="gem">✦ 0</span>
  </div>

  <div class="timer" id="display">25:00</div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="settings-labels">
    <span>focus</span>
    <span>break</span>
  </div>

  <div class="settings">
    <input id="work" type="number" value="25">
    <input id="break" type="number" value="5">
  </div>

  <div class="buttons">
    <button onclick="startTimer()">start</button>
    <button onclick="pauseTimer()">pause</button>
    <button onclick="resetTimer()">reset</button>
  </div>
</div>

<script>
let timeLeft = 25 * 60;
let totalTime = 25 * 60;
let timer = null;
let running = false;
let isWork = true;

let studySeconds = 0;
let gems = Number(localStorage.getItem("gems")) || 0;
let darkMode = false;

const display = document.getElementById("display");
const mode = document.getElementById("mode");
const gemDisplay = document.getElementById("gem");
const workInput = document.getElementById("work");
const breakInput = document.getElementById("break");
const progress = document.getElementById("progress");

function updateDisplay() {
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  display.textContent =
    String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");

  progress.style.width = (timeLeft / totalTime) * 100 + "%";
}

function setTime(mins) {
  timeLeft = mins * 60;
  totalTime = mins * 60;
  updateDisplay();
}

function updateStatus() {
  mode.textContent = isWork ? "focus" : "break";
  gemDisplay.textContent = "✦ " + gems;
}

function enableDarkMode() {
  if (darkMode) return;
  darkMode = true;

  document.body.classList.add("dark");

  setTimeout(() => {
    document.body.style.boxShadow = "none";
  }, 1200);

  mode.textContent = "night mode";
  gemDisplay.textContent = "✦ " + gems;
}

function addGem() {
  gems++;
  localStorage.setItem("gems", gems);

  gemDisplay.textContent = "✦ " + gems;

  gemDisplay.classList.add("gem-glow");
  setTimeout(() => gemDisplay.classList.remove("gem-glow"), 600);
}

function startTimer() {
  if (running) return;
  running = true;

  updateStatus();

  timer = setInterval(() => {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();

      if (isWork) {
        studySeconds++;

        // 💎 1 gem per 5 min
        if (studySeconds % 300 === 0) {
          addGem();
          updateStatus();
        }

        // 🌙 1 hour night mode
        if (studySeconds >= 3600) {
          enableDarkMode();
        }
      }

    } else {
      isWork = !isWork;

      let next = isWork
        ? Number(workInput.value)
        : Number(breakInput.value);

      setTime(next);
      updateStatus();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  timer = null;
  running = false;
  updateStatus();
}

function resetTimer() {
  clearInterval(timer);
  timer = null;
  running = false;

  isWork = true;
  studySeconds = 0;

  setTime(Number(workInput.value));
  updateStatus();
}

setTime(25);
updateStatus();
updateDisplay();
</script>

</body>
</html>
