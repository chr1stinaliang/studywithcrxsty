<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>25-Minute Pomodoro Timer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .timer-container {
      text-align: center;
      background: #1f2937;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .time {
      font-size: 64px;
      font-weight: bold;
      margin: 20px 0;
    }

    .buttons button {
      background: #3b82f6;
      border: none;
      color: white;
      padding: 12px 20px;
      margin: 8px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .buttons button:hover {
      background: #2563eb;
    }

    .buttons button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <div class="timer-container">
    <h1>Pomodoro Timer</h1>
    <div class="time" id="display">25:00</div>

    <div class="buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <script>
    let timeLeft = 25 * 60;
    let timer = null;
    let isRunning = false;

    const display = document.getElementById("display");

    function updateDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;

      display.textContent =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function startTimer() {
      if (isRunning) return;

      isRunning = true;

      timer = setInterval(() => {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timer);
          isRunning = false;
          alert("Pomodoro complete! Time for a break 🍅");
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      isRunning = false;
    }

    function resetTimer() {
      clearInterval(timer);
      isRunning = false;
      timeLeft = 25 * 60;
      updateDisplay();
    }

    updateDisplay();
  </script>

</body>
</html>
