<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomodoro timer</title>

<link href="https://fonts.googleapis.com/css2?family=courier+prime:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: "courier prime", monospace;
  background: #33427a;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 340px;
  padding: 32px;
  border-radius: 18px;
  text-align: center;
}

h1 {
  color: #6580a3;
  font-size: 18px;
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.status {
  color: #6580a3;
  font-size: 13px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.timer {
  font-size: 64px;
  font-weight: 700;
  color: #6580a3;
  margin: 20px 0;
  letter-spacing: 3px;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-family: "courier prime", monospace;
  font-weight: 700;
  background: #d9c9a9;
  color: #33427a;
  transition: 0.2s ease;
}

button:hover {
  transform: translatey(-2px);
  opacity: 0.9;
}

button:active {
  transform: scale(0.97);
}
</style>
</head>

<body>

<div class="card">
  <h1>pomodoro</h1>
  <div class="status" id="status">ready</div>
  <div class="timer" id="display">25:00</div>

  <div class="buttons">
    <button onclick="starttimer()">start</button>
    <button onclick="pausetimer()">pause</button>
    <button onclick="resettimer()">reset</button>
  </div>
</div>

<script>
let timeleft = 25 * 60;
let timer = null;
let running = false;

const display = document.getelementbyid("display");
const status = document.getelementbyid("status");

function updatedisplay() {
  let m = math.floor(timeleft / 60);
  let s = timeleft % 60;
  display.textcontent =
    `${string(m).padstart(2,"0")}:${string(s).padstart(2,"0")}`;
}

function starttimer() {
  if (running) return;
  running = true;
  status.textcontent = "focus";

  timer = setinterval(() => {
    if (timeleft > 0) {
      timeleft--;
      updatedisplay();
    } else {
      clearinterval(timer);
      running = false;
      status.textcontent = "done";
      alert("time's up!");
    }
  }, 1000);
}

function pausetimer() {
  clearinterval(timer);
  running = false;
  status.textcontent = "paused";
}

function resettimer() {
  clearinterval(timer);
  running = false;
  timeleft = 25 * 60;
  updatedisplay();
  status.textcontent = "ready";
}

updatedisplay();
</script>

</body>
</html>
