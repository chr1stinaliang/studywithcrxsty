<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomodoro timer</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: "Courier Prime", monospace;
  background: #33427a;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 380px;
  padding: 30px;
  border-radius: 18px;
  text-align: center;
}

h1 {
  color: #6580a3;
  font-size: 27px;
  letter-spacing: 2px;
  text-transform: lowercase;
  margin-bottom: 10px;
}

.status {
  color: #6580a3;
  font-size: 19px;
  margin-bottom: 15px;
  opacity: 0.8;
  text-transform: lowercase;
}

.timer {
  font-size: 96px;
  font-weight: 700;
  color: #6580a3;
  margin: 20px 0;
}

.progress-container {
  width: 100%;
  height: 10px;
  background: rgba(217, 201, 169, 0.25);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: #d9c9a9; /* 👈 changed to match buttons */
  transition: width 1s linear;
}

.settings-labels {
  display: flex;
  justify-content: space-between;
  color: #6580a3;
  font-size: 14px;
  margin-bottom: 5px;
  text-transform: lowercase;
}

.settings {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 15px;
}

input {
  width: 90px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #d9c9a9;
  color: #33427a;
  font-family: "Courier Prime", monospace;
  font-weight: 700;
  text-align: center;
}

.buttons {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: "Courier Prime", monospace;
  font-weight: 700;
  background: #d9c9a9;
  color: #33427a;
  transition: 0.2s ease;
  text-transform: lowercase;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">
  <h1>pomodoro</h1>

  <div class="status" id="status">ready</div>
  <div class="timer" id="display">25:00</div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="settings-labels">
    <span>focus for how long?</span>
    <span>break</span>
  </div>

  <div class="settings">
    <input id="work" type="number" value="25">
    <input id="break" type="number" value="5">
  </div>

  <div class="buttons">
    <button onclick="startTimer()">start</button>
    <button onclick="pauseTimer()">pause</button>
    <button onclick="resetTimer()">reset</button>
  </div>
</div>

<script>
let timeLeft = 25 * 60;
let totalTime = 25 * 60;
let timer = null;
let running = false;
let isWork = true;

const display = document.getElementById("display");
const status = document.getElementById("status");
const workInput = document.getElementById("work");
const breakInput = document.getElementById("break");
const progress = document.getElementById("progress");

function updateDisplay() {
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  display.textContent =
    String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");

  let percent = (timeLeft / totalTime) * 100;
  progress.style.width = percent + "%";
}

function setTime(mins) {
  timeLeft = mins * 60;
  totalTime = mins * 60;
  updateDisplay();
}

function startTimer() {
  if (running) return;
  running = true;

  status.textContent = isWork ? "focus" : "break";

  timer = setInterval(() => {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      isWork = !isWork;
      let next = isWork ? workInput.value : breakInput.value;
      setTime(next);
      status.textContent = isWork ? "focus" : "break";
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  running = false;
  status.textContent = "paused";
}

function resetTimer() {
  clearInterval(timer);
  running = false;
  isWork = true;
  setTime(workInput.value);
  status.textContent = "ready";
}

setTime(25);
</script>

</body>
</html>
