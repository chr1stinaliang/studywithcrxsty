<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pomodoro timer</title>

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
  font-family: "Courier Prime", monospace;
  background: #33427a;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 360px;
  padding: 28px;
  border-radius: 18px;
  text-align: center;
}

h1 {
  color: #6580a3;
  font-size: 18px;
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: lowercase;
}

.status {
  color: #6580a3;
  font-size: 13px;
  margin-bottom: 15px;
  opacity: 0.8;
  text-transform: lowercase;
}

.timer {
  font-size: 60px;
  font-weight: 700;
  color: #6580a3;
  margin: 15px 0;
}

.settings {
  margin: 15px 0;
  display: flex;
  gap: 10px;
  justify-content: center;
}

input {
  width: 70px;
  padding: 8px;
  border-radius: 8px;
  border: none;
  text-align: center;
  font-family: "Courier Prime", monospace;
  background: #d9c9a9;
  color: #33427a;
  font-weight: 700;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-family: "Courier Prime", monospace;
  font-weight: 700;
  background: #d9c9a9;
  color: #33427a;
  text-transform: lowercase;
  transition: 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">
  <h1>pomodoro</h1>

  <div class="status" id="status">ready</div>
  <div class="timer" id="display">25:00</div>

  <div class="settings">
    <input id="workInput" type="number" value="25"> 
    <input id="breakInput" type="number" value="5">
  </div>

  <div class="buttons">
    <button onclick="startTimer()">start</button>
    <button onclick="pauseTimer()">pause</button>
    <button onclick="resetTimer()">reset</button>
  </div>
</div>

<script>
let timeLeft;
let timer = null;
let running = false;
let isWork = true;

const display = document.getElementById("display");
const status = document.getElementById("status");
const workInput = document.getElementById("workInput");
const breakInput = document.getElementById("breakInput");

function setTime(minutes) {
  timeLeft = minutes * 60;
}

function updateDisplay() {
  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  display.textContent =
    String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
}

function startTimer() {
  if (running) return;
  running = true;

  if (!timeLeft) {
    setTime(parseInt(workInput.value));
  }

  status.textContent = isWork ? "focus" : "break";

  timer = setInterval(() => {
    if (timeLeft > 0) {
      timeLeft--;
      updateDisplay();
    } else {
      isWork = !isWork;
      setTime(isWork ? workInput.value : breakInput.value);
      status.textContent = isWork ? "focus" : "break";
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timer);
  running = false;
  status.textContent = "paused";
}

function resetTimer() {
  clearInterval(timer);
  running = false;
  isWork = true;
  setTime(workInput.value);
  updateDisplay();
  status.textContent = "ready";
}

setTime(25);
updateDisplay();
</script>

</body>
</html>
